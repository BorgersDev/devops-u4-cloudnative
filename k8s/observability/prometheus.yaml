# Prometheus no cluster, descobrindo pods por annotations (US-007, FR-13).
# Instalado uma vez no namespace cloudnative (infra de observabilidade). O deploy
# da aplicacao continua sendo feito pelo pipeline; este stack e aplicado a parte.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: cloudnative
  labels:
    app: prometheus
    part-of: devops-u4-cloudnative
---
# ClusterRole minimo para a service discovery do Prometheus (somente leitura).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-cloudnative
  labels:
    app: prometheus
    part-of: devops-u4-cloudnative
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-cloudnative
  labels:
    app: prometheus
    part-of: devops-u4-cloudnative
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-cloudnative
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: cloudnative
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cloudnative
  labels:
    app: prometheus
    part-of: devops-u4-cloudnative
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      # Descoberta de pods anotados (prometheus.io/scrape, /path, /port) no
      # namespace cloudnative. Cobre data-service e gateway-service.
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [cloudnative]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: replace
            target_label: app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: cloudnative
  labels:
    app: prometheus
    component: observability
    part-of: devops-u4-cloudnative
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
        component: observability
        part-of: devops-u4-cloudnative
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: cloudnative
  labels:
    app: prometheus
    component: observability
    part-of: devops-u4-cloudnative
spec:
  type: ClusterIP
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
