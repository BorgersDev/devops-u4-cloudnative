# Jaeger all-in-one (US-009, FR-16). Recebe spans via OTLP (4317/4318) e expoe a
# UI em 16686. Instalado uma vez no namespace cloudnative. Imagem oficial multi-arch
# (roda no cluster arm64). Armazenamento em memoria, suficiente para o laboratorio.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: cloudnative
  labels:
    app: jaeger
    component: observability
    part-of: devops-u4-cloudnative
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
        component: observability
        part-of: devops-u4-cloudnative
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.60
          env:
            # Habilita os receptores OTLP (gRPC 4317 e HTTP 4318).
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
          ports:
            - name: ui
              containerPort: 16686
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: cloudnative
  labels:
    app: jaeger
    component: observability
    part-of: devops-u4-cloudnative
spec:
  type: ClusterIP
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
