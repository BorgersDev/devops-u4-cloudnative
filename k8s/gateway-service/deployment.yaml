apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: cloudnative
  labels:
    app: gateway-service
    component: consumer
    tier: frontend
    part-of: devops-u4-cloudnative
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
        component: consumer
        tier: frontend
        part-of: devops-u4-cloudnative
      # Annotations de scrape: o Prometheus descobre o pod e raspa o /metrics do
      # container app na porta 8000 (Passo 2, FR-13).
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: gateway-service
          # OWNER deve ser substituido pelo dono do repositorio (minusculo).
          # O workflow troca esta imagem para a tag por SHA curto via kubectl set image.
          image: ghcr.io/OWNER/devops-u4-cloudnative/gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            # DNS interno do Kubernetes: <service>.<namespace>.svc.cluster.local
            - name: DATA_SERVICE_URL
              value: "http://data-service.cloudnative.svc.cluster.local:8000"
            - name: DATA_SERVICE_TIMEOUT_SECONDS
              value: "2.0"
            # OTEL_SERVICE_NAME distingue os servicos no Jaeger (FR-14).
            - name: OTEL_SERVICE_NAME
              value: "gateway-service"
            # Exporta spans para o sidecar otel-collector via OTLP gRPC em localhost.
            # O esquema http:// sinaliza canal inseguro (sem TLS) no exportador gRPC.
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://localhost:4317"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "grpc"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
        # Padrao sidecar (FR-15): collector OTel no mesmo pod do app. Recebe spans
        # em localhost:4317/4318 e os encaminha ao Jaeger. Imagem contrib oficial,
        # multi-arch (roda no cluster arm64).
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.110.0
          args: ["--config=/conf/collector.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: otel-collector-config
              mountPath: /conf
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: otel-collector-config
          configMap:
            name: otel-collector-config
