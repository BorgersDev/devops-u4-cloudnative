name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/devops-u4-cloudnative
  K8S_NAMESPACE: cloudnative

jobs:
  build-and-push:
    name: Build e push das imagens (GHCR)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir variaveis
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          # Forma portavel (funciona no bash 3.2 do macOS, comum em self-hosted runner).
          owner_lc=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (build multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push data-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/data-service
          push: true
          # Multi-arch: roda tanto em runners amd64 quanto em clusters arm64
          # (ex.: Minikube no Apple Silicon).
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/devops-u4-cloudnative/data-service:latest
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/devops-u4-cloudnative/data-service:${{ steps.vars.outputs.sha_short }}

      - name: Build e push gateway-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/gateway-service
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/devops-u4-cloudnative/gateway-service:latest
            ${{ env.REGISTRY }}/${{ steps.vars.outputs.owner_lc }}/devops-u4-cloudnative/gateway-service:${{ steps.vars.outputs.sha_short }}

  deploy:
    name: Deploy automatico no cluster
    needs: build-and-push
    # Self-hosted runner conectado ao cluster local (Minikube/K3s).
    # Veja README para registrar o runner e dar acesso ao kubeconfig.
    runs-on: [self-hosted, k8s]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Definir variaveis
        id: vars
        run: |
          echo "sha_short=${{ needs.build-and-push.outputs.sha_short }}" >> "$GITHUB_OUTPUT"
          # Forma portavel (funciona no bash 3.2 do macOS, comum em self-hosted runner).
          owner_lc=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=${owner_lc}" >> "$GITHUB_OUTPUT"

      - name: Aplicar manifestos
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/data-service/
          kubectl apply -f k8s/gateway-service/

      - name: Atualizar imagens para a tag por SHA curto
        run: |
          IMG_BASE="${REGISTRY}/${{ steps.vars.outputs.owner_lc }}/devops-u4-cloudnative"
          kubectl -n "${K8S_NAMESPACE}" set image deployment/data-service \
            data-service="${IMG_BASE}/data-service:${{ steps.vars.outputs.sha_short }}"
          kubectl -n "${K8S_NAMESPACE}" set image deployment/gateway-service \
            gateway-service="${IMG_BASE}/gateway-service:${{ steps.vars.outputs.sha_short }}"

      - name: Validar rollout
        run: |
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/data-service --timeout=120s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/gateway-service --timeout=120s

      - name: Estado final
        run: |
          kubectl -n "${K8S_NAMESPACE}" get pods -o wide
          kubectl -n "${K8S_NAMESPACE}" get svc
